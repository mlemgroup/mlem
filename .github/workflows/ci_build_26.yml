name: CI - Build - Xcode 26

on:
    push:
        branches:
        - main

    pull_request:
        branches:
        - main

jobs:
  Build:
    permissions: write-all
    runs-on: macos-26
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'true'

    - name: Build
      uses: "./.github/actions/ci_xcodebuild"
      with:
        xcode_version: "26.4"
        xcodebuild_destination: "platform=iOS Simulator,name=iPhone 17,OS=26.4.1"
        xcodebuild_action: "build"
