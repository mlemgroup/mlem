name: CI - Build - Xcode 16

on:
    push:
        branches:
        - master
        - dev

    pull_request:
        branches:
        - master
        - dev

jobs:
  Build:
    permissions: write-all
    runs-on: macos-15-arm64
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'true'

    - name: Build
      uses: "./.github/actions/ci_xcodebuild"
      with:
        xcode_version: "16.4"
        xcodebuild_destination: "platform=iOS Simulator,name=iPhone 16,OS=18.5"
        xcodebuild_action: "build"
